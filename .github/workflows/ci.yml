name: Frontend CI/CD

on:
  push:
    branches:
      - Frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t my-frontend.

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: |
          docker tag my-frontend username/my-frontend:latest
          docker push username/my-frontend:latest

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull username/my-frontend:latest
            docker stop frontend || true
            docker rm frontend || true
            docker run -d -p 3000:80 --name frontend username/my-frontend:latest
